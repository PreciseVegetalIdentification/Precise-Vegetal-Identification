<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clé de détermination botanique — v0.35</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--surface:#FDFCFA;--border:#DDD8CF;--border-lt:#EDE9E2;
  --text:#1A1812;--text-2:#5C5649;--text-3:#9A9385;
  --green:#2D6A4F;--green-lt:#EAF2EC;
  --blue:#1A4A7A;--blue-lt:#E6EEF7;
  --amber:#7A4A10;--amber-lt:#F5EBD8;
  --r:6px;--rl:10px;
}
html{background:var(--bg)}
body{font-family:'Crimson Pro',Georgia,serif;color:var(--text);min-height:100vh;background:var(--bg)}
.shell{max-width:680px;margin:0 auto;padding:32px 20px 60px}
.hdr{text-align:center;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border-lt)}
.hdr h1{font-weight:300;font-size:26px;letter-spacing:.04em;margin-bottom:6px}
.hdr p{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)}
.prog{display:flex;gap:3px;margin-bottom:20px;height:2px}
.dot{flex:1;border-radius:2px;background:var(--border)}
.dot.done{background:var(--green)}.dot.active{background:var(--green);opacity:.4}
.bc{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px;min-height:22px}
.crumb{font-family:'DM Mono',monospace;font-size:10px;background:var(--surface);border:1px solid var(--border-lt);border-radius:3px;padding:2px 8px;color:var(--text-3)}
.tag-o{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:var(--green-lt);color:var(--green);border:1px solid #C2DAC8;border-radius:3px;padding:2px 8px;margin-bottom:8px}
.tag-s{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;background:var(--blue-lt);color:var(--blue);border:1px solid #C2D4E8;border-radius:3px;padding:2px 8px;margin-left:5px;margin-bottom:8px}
.slbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.q{font-size:20px;font-weight:400;line-height:1.45;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:13px 16px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:12px;transition:border-color .12s,background .12s;font-family:'Crimson Pro',Georgia,serif}
.opt:hover{border-color:var(--green);background:#F4F8F5}
/* ── Pagination options ── */
.opt-page{font-size:11px;color:var(--text-2);text-align:right;margin-bottom:4px;letter-spacing:.03em}
.opt-nav{display:flex;gap:8px;margin-top:6px;align-items:center}
.opt-autre{background:var(--green-lt);border:1px dashed var(--green);border-radius:var(--rl);padding:12px 18px;cursor:pointer;text-align:left;width:100%;font-family:'Crimson Pro',Georgia,serif;display:flex;align-items:center;justify-content:space-between;color:var(--green);font-size:15px;transition:background .12s;margin-top:4px}
.opt-autre:hover{background:#DDF0E4}
.opt-prev{background:none;border:1px solid var(--border);border-radius:var(--rl);padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text-2);font-family:'Crimson Pro',Georgia,serif;transition:background .12s;margin-top:4px}
.opt-prev:hover{background:var(--surface)}
.opt-inconnu{background:none;border:1px solid var(--border);border-radius:var(--rl);padding:9px 16px;cursor:pointer;text-align:left;width:100%;font-family:'Crimson Pro',Georgia,serif;font-size:13px;color:var(--text-2);margin-top:10px;display:flex;align-items:center;gap:8px;transition:background .12s}
.opt-inconnu:hover{background:var(--surface)}
.opt:hover{border-color:var(--green);background:#F4F8F5}
.ol{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;width:20px;height:20px;border-radius:50%;background:var(--border-lt);display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0;margin-top:2px}
.ot{font-size:15px;line-height:1.5}
.branches{display:flex;flex-direction:column;gap:7px}
.branch{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .12s,background .12s}
.branch:hover{border-color:var(--green);background:#F4F8F5}
.branch.dashed{border-style:dashed}
.bic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.bn{font-size:15px;font-weight:500}.bs{font-size:13px;color:var(--text-2);margin-top:2px}
.ba{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-3);min-width:58px;text-align:right}
.div{border:none;border-top:1px solid var(--border-lt);margin:4px 0}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* ── Gymno organ grid (5 buttons) ── */
.gyo{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gyo .gyob{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 10px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s;font-family:'Crimson Pro',Georgia,serif}
.gyo .gyob:hover{border-color:var(--green);background:#F4F8F5}
.gyo .gyob.wide{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:12px;text-align:left;padding:14px 18px;border-color:#C2DAC8;background:var(--green-lt)}
.gyo .gyob.wide:hover{border-color:var(--green);background:#DDF0E4}
.gyob-ic{font-size:22px;margin-bottom:5px}
.gyob-n{font-size:13px;font-weight:500}
.gyob-s{font-size:11px;color:var(--text-2);margin-top:2px}
.gb{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px 16px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s}
.gb:hover{border-color:var(--green);background:#F4F8F5}
.gic{font-size:36px;margin-bottom:10px}.gn{font-size:16px;font-weight:500;margin-bottom:4px}.gs{font-size:12px;color:var(--text-2)}
.og{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ob{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 12px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s}
.ob:hover{border-color:var(--green);background:#F4F8F5}
.ob.wide{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:14px;text-align:left;padding:18px 20px;border-color:#C2DAC8;background:var(--green-lt)}
.ob.wide:hover{border-color:var(--green);background:#DDF0E4}
.oic{font-size:24px;margin-bottom:6px}.on{font-size:14px;font-weight:500}.os{font-size:11px;color:var(--text-2);margin-top:2px}
.res{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:28px}
.rb{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:var(--green-lt);color:var(--green);border:1px solid #C2DAC8;border-radius:3px;padding:2px 10px;display:inline-block;margin-bottom:12px}
.rn{font-size:26px;font-weight:400;font-style:italic;margin-bottom:4px}
.rsy{font-size:14px;color:var(--text-2);margin-bottom:16px}
.rf{font-family:'DM Mono',monospace;font-size:11px;background:var(--blue-lt);border:1px solid #C2D4E8;border-radius:var(--r);padding:7px 12px;margin-bottom:10px;color:var(--blue);letter-spacing:.02em}
.rf-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.7;display:block;margin-bottom:3px}
.rfm{font-family:'DM Mono',monospace;font-size:12px;background:#FEF0F3;border:1px solid #F0C0CC;border-radius:var(--r);padding:9px 14px;margin-bottom:16px;color:#8B2040;letter-spacing:.04em}
.rc{margin-bottom:14px}
.cr{display:flex;gap:9px;margin-bottom:8px;font-size:14px;line-height:1.5}
.cd{color:var(--green);flex-shrink:0;margin-top:2px;font-size:12px}

/* ── Photo carousel ── */
.pcar{margin:0 0 18px 0;border-radius:var(--rl);overflow:hidden;background:var(--surface);border:1px solid var(--border)}
.pcar-label{padding:8px 14px;font-size:12px;color:var(--text-2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.pcar-count{font-size:11px;color:var(--text-3,#aaa)}
.pcar-img-wrap{width:100%;aspect-ratio:4/3;background:#f0f0f0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pcar-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
.pcar-loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-2);font-size:13px;gap:8px}
.pcar-err{font-size:12px;color:var(--text-2);padding:20px;text-align:center}
.pcar-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 12px}
.pcar-btn{background:none;border:1px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--text);display:flex;align-items:center;justify-content:center;transition:background .1s}
.pcar-btn:hover{background:var(--green-lt)}
.pcar-dots{display:flex;gap:5px;align-items:center}
.pcar-dot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .15s}
.pcar-dot.active{background:var(--green)}

.rft{border-left:2px solid var(--amber);padding:8px 14px;font-size:14px;color:var(--text-2);margin-bottom:20px;border-radius:0 var(--r) var(--r) 0;background:var(--amber-lt)}
.rft strong{color:var(--amber);font-weight:600}
.restart{background:transparent;border:1px solid var(--border);color:var(--text-2);padding:8px 20px;border-radius:var(--r);font-size:13px;font-family:'Crimson Pro',Georgia,serif;cursor:pointer;transition:border-color .12s,color .12s}
.restart:hover{border-color:var(--green);color:var(--green)}
/* ── Phycophytes : grille de couleurs ── */
.pc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px}
.pc-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 12px;cursor:pointer;text-align:center;transition:border-color .12s,background .12s;font-family:'Crimson Pro',Georgia,serif}
.pc-btn:hover{border-color:var(--green);background:#F4F8F5}
.pc-ic{font-size:28px;margin-bottom:8px}
.pc-n{font-size:15px;font-weight:500;margin-bottom:3px}
.pc-s{font-size:11px;color:var(--text-2)}
.pc-blue{display:flex;align-items:center;gap:14px;text-align:left;padding:16px 20px;border-style:dashed;border-color:#4A90D9;background:#EEF4FB}
.pc-blue:hover{background:#E0ECF8;border-color:#2A6AB8}
.pc-warn{font-size:12px;color:#8B2020;margin-top:4px;font-style:italic}
/* ── Résultat avertissement (Cyanobactéries) ── */
.res-warn{background:#FFF8E1;border:1px dashed #D4A017;border-radius:var(--rl);padding:28px}
.warn-icon{font-size:36px;margin-bottom:12px}
.warn-title{font-size:22px;font-weight:500;margin-bottom:8px;color:#7A4A10}
.warn-body{font-size:15px;line-height:1.65;color:var(--text-2);margin-bottom:20px}

/* ── Glossaire : termes dans les QUESTIONS → clic modal ── */
.gl{border-bottom:1px dotted var(--text-3);cursor:pointer;transition:color .1s,border-color .1s}
.gl:hover{color:var(--green);border-bottom-color:var(--green)}

/* ── Glossaire : termes dans les OPTIONS → hover 0.5s tooltip ── */
.glt{border-bottom:1px dotted var(--text-3);cursor:help;transition:color .1s,border-color .1s;position:relative}
.glt:hover{color:var(--green);border-bottom-color:var(--green)}

/* ── Tooltip flottant ── */
#tooltip{
  display:none;
  position:fixed;
  z-index:300;
  background:var(--text);
  color:#F7F5F0;
  font-family:'Crimson Pro',Georgia,serif;
  font-size:13px;
  line-height:1.55;
  padding:10px 14px;
  border-radius:var(--r);
  max-width:300px;
  pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
#tooltip .tt-term{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.6;display:block;margin-bottom:5px}
#tooltip .tt-src{font-family:'DM Mono',monospace;font-size:9px;opacity:.5;display:block;margin-top:6px}

/* ── Modal glossaire (clic depuis questions) ── */
.mb{display:none;position:fixed;inset:0;background:rgba(20,18,12,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.mb.open{display:flex}
.md{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:26px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.mt{font-size:20px;font-weight:500}
.mc{background:none;border:none;font-size:18px;color:var(--text-3);cursor:pointer;padding:0 0 0 12px}
.mc:hover{color:var(--text)}
.ms{font-family:'DM Mono',monospace;font-size:10px;background:var(--blue-lt);color:var(--blue);border:1px solid #C2D4E8;border-radius:3px;padding:2px 8px;display:inline-block;margin-bottom:14px}
.mdf{font-size:15px;line-height:1.65;color:var(--text-2)}
</style>
</head>
<body>

<!-- Tooltip flottant pour les options -->
<div id="tooltip">
  <span class="tt-term" id="ttTerm"></span>
  <span id="ttDef"></span>
  <span class="tt-src" id="ttSrc"></span>
</div>

<!-- Modal pour les questions (clic) -->
<div class="mb" id="mb" onclick="mbc(event)">
  <div class="md">
    <div class="mh"><span class="mt" id="mTerm"></span><button class="mc" onclick="cgl()">✕</button></div>
    <span class="ms" id="mSrc"></span>
    <p class="mdf" id="mDef"></p>
  </div>
</div>

<div class="shell">
  <div class="hdr">
    <h1>Clé de détermination botanique</h1>
    <p>v0.35 — MOOC · BRDV · TP L2 · Plantes&Santé · Adventices · Diversité végétaux I & II · Gymnospermes</p>
  </div>
  <div class="bc" id="bc"></div>
  <div class="prog" id="prog"></div>
  <div id="app"></div>
</div>

<script>
// ══ GLOSSAIRE — gl.md (version corrigée utilisateur) ════════════════════
const GL={
"Actinomorphe":{d:"Fleur actinomorphe : symétrie radiaire.",s:"[TP][BRDV]"},
"Akène":{d:"La graine est libre dans le fruit (non associée au péricarpe).",s:"[TP][BRDV]"},
"Albumen":{d:"Tissu nourricier à 3n chromosomes.",s:"[TP][BRDV]"},
"Alternipétale":{d:"Position des étamines : insérées entre les pétales.",s:"[TP]"},
"Anisogamie":{d:"Fécondation mettant en présence 2 gamètes morphologiquement et/ou physiologiquement différents.",s:"[DV2]"},
"Annulus":{d:"Cellules en anneau à paroi rigidifiée par la lignine, présentes autour des sporanges des fougères (Filicophytes). Joue un rôle dans la libération mécanique des spores à maturité.",s:"[PT]"},
"Anthère":{d:"Produit les gamétophytes (pollen).",s:"[BRDV]"},
"Anthéridie":{d:"Gamétange mâle des bryophytes et ptéridophytes. Structure pluricellulaire à tissu épidermique protecteur contenant un tissu spermogène. À maturité, le capuchon apical s'autolyse et libère les spermatozoïdes flagellés (anthérozoïdes) dans l'eau.",s:"[BR]"},
"Anthérozoïde":{d:"Spermatozoïde flagellé produit par les anthéridies des bryophytes et ptéridophytes. Guidé par chimiotactisme vers l'oosphère.",s:"[BR]"},
"Aphylles":{d:"Forte réduction de la taille des feuilles, voire leur quasi-disparition ou leur disparition totale. Chez Ephedra (Gnetophyta).",s:"[GY]"},
"Apifixe":{d:"Insertion du filet dans l'anthère au sommet.",s:"[TP]"},
"Archégone":{d:"Gamétange rudimentaire contenant l'oosphère. Présent dans l'endosperme (gamétophyte femelle) des gymnospermes.",s:"[GY]"},
"Archéthalle":{d:"Thalle où toutes les cellules ont le même rôle, elles se divisent toutes. Peut être unicellulaire (flagellé ou non) ou colonial (cellules maintenues par un mucilage).",s:"[DV2]"},
"Arille":{d:"Enveloppe charnue dérivant d'un anneau de tissu à la base de l'ovule, se développant pendant la maturation de la graine. Adaptation à la dispersion par les animaux (zoochorie).",s:"[PS][GY]"},
"Baie":{d:"Les trois tissus du péricarpe sont charnus. Les graines (appelées pépins) sont généralement nombreuses (le fruit est polyspermé) et libres.",s:"[TP][BRDV]"},
"Ballonet aérifère":{d:"Expansion de l'enveloppe du grain de pollen des Coniférophytes se remplissant d'air, permettant d'alléger le grain de pollen et de le déplacer facilement par le vent.",s:"[GY]"},
"Basifixe":{d:"Insertion du filet dans l'anthère à la base.",s:"[TP]"},
"Biloculaire":{d:"Ovaire à deux loges.",s:"[TP]"},
"Caliciflore":{d:"Étamines soudées au calice.",s:"[TP]"},
"Cambium":{d:"Méristème secondaire qui assure la croissance en largeur.",s:"[GY]"},
"Capitule":{d:"Ombelle sans pédoncule. [BRDV] Inflorescence formant une petite tête composée de nombreuses fleurs portées par un réceptacle commun.",s:"[BRDV][MOOC]"},
"Carpelle":{d:"Pièce florale femelle, pouvant être fermée sur elle-même ou ouverte, libre ou soudée.",s:"[TP][BRDV]"},
"Caryopse":{d:"Le péricarpe adhère à la graine ; ils sont indissociables, représente à la fois le fruit et la graine.",s:"[TP][BRDV]"},
"Cellule du tube":{d:"Dans le grain de pollen des gymnospermes : cellule qui formera le tube permettant l'acheminement des anthérozoïdes vers l'oosphère.",s:"[GY]"},
"Cellule générative (spermatogène)":{d:"Dans le grain de pollen des gymnospermes : cellule qui donnera les spermatozoïdes.",s:"[GY]"},
"Cellule sous-stomatique":{d:"Cellule formant une assise cellulaire en partie basale, pouvant soutenir les cellules de garde du stomate.",s:"[GY]"},
"Chaume":{d:"Tige creuse sauf aux nœuds. Caractéristique des Poaceae. [MOOC] Tige creuse entre les nœuds mais cloisonnée au niveau des nœuds.",s:"[MOOC][ADV]"},
"Chimiotactisme":{d:"Propriété d'une cellule isolée et mobile, ou d'un organisme vivant, sensible à l'attraction ou à la répulsion par une substance chimique.",s:"[BR]"},
"Châton":{d:"Épi allongé de fleurs unisexuées à enveloppes florales absentes, réduites ou écailleuses.",s:"[BRDV][GY]"},
"Clade BEP":{d:"Clade des Poaceae : Bambusoideae, Ehrhartoideae, Pooideae.",s:"[ADV]"},
"Clade PACCMAD":{d:"Clade des Poaceae : Panicoideae, Arundinoideae, Chloridoideae, Centothecoideae, Micrairoideae, Aristidoideae, Danthonioideae.",s:"[ADV]"},
"Cladome primaire":{d:"Axe de croissance préférentiel du cladothalle. La cellule apicale de cet axe est à croissance infinie.",s:"[DV2]"},
"Cladothalle":{d:"Thalle avec un axe préférentiel de croissance (cladome primaire) et des axes secondaires (cladomes secondaires et pleuridies). Pluricellulaires vrais — cellules liées par leurs parois.",s:"[DV2]"},
"Coiffe":{d:"Tissu protecteur recouvrant la capsule (sporange) des bryophytes. Correspond au reste de l'archégone entraîné lors de la croissance du sporogone.",s:"[BR]"},
"Coléoptile":{d:"Tissu de protection de la gemmule.",s:"[TP][BRDV]"},
"Coléorhize":{d:"Tissu de protection du radicule.",s:"[TP][BRDV]"},
"Conceptacle":{d:"⚠ Terme polysémique : (1) Chez les Angiospermes : réceptacle floral soudé à l'ovaire infère. [TP][BRDV] (2) Chez les algues (Fucus) : petite poche dans laquelle sont groupés les filaments reproducteurs (sporocystes / gamétocystes).",s:"[TP][BRDV][DV2]"},
"Corbeille à propagules":{d:"Organe spécialisé de production et de libération des propagules, présent chez les hépatiques et certaines mousses (souvent sur les phyllidies).",s:"[BR]"},
"Cormus":{d:"Appareil végétatif = racine + tronc ou tige + feuilles ou frondes.",s:"[BRDV]"},
"Corolle bilabiée":{d:"Chez les Lamiaceae : corolle à 5 pétales soudés formant un tube à la base et deux lèvres au sommet.",s:"[MOOC]"},
"Corolle papilionacée":{d:"Chez les Fabaceae (Papilionoideae) : 5 pétales — l'étendard en position supérieure, 2 ailes latérales, 2 pétales soudés formant une carène en forme de bateau.",s:"[MOOC]"},
"Corolliflore":{d:"Étamines soudées à la corolle.",s:"[TP]"},
"Corymbe":{d:"Fleurs dont le pédoncule est inséré le long de l'axe et continue à pousser — nivellement des fleurs.",s:"[BRDV]"},
"Cotylédon(s)":{d:"Premières feuilles embryonnaires : 2 chez les dicotylédones, 1 chez les monocotylédones.",s:"[TP][BRDV]"},
"Coussinet":{d:"Structure formée par l'agrégation de bryophytes. Cette agrégation permet de maintenir un milieu humide à la base, favorable au développement des individus.",s:"[BR]"},
"Crosse circinée":{d:"Mode de croissance des jeunes frondes de fougères, enroulées sur elles-mêmes en forme de crosse, qui se déroulent progressivement à maturité.",s:"[PT][DV]"},
"Cryptogame":{d:"Se dit d'une plante dont la fécondation se fait dans une crypte (structure cachée) de l'archégone. S'applique aux bryophytes et aux ptéridophytes.",s:"[PT]"},
"Cuticule":{d:"Couche protectrice et imperméabilisante sur l'épiderme des aiguilles de gymnospermes et des feuilles de certaines plantes.",s:"[GY]"},
"Cyathium":{d:"Chez les Euphorbia : inflorescence caractéristique (pseudanthe) = involucre portant des glandes nectarifères + 1 fleur ♀ + fleurs ♂ réduites.",s:"[PS]"},
"Cyme bipare":{d:"Deux fleurs n+1 se développent respectivement à gauche et à droite du pédoncule de la fleur précédente.",s:"[BRDV]"},
"Cyme hélicoïde":{d:"La fleur n+1 se développe à la base du pédoncule de la fleur précédente, en alternant gauche et droite.",s:"[BRDV]"},
"Cyme scorpioïde":{d:"Inflorescence sympodiale : la fleur n+1 se développe sur le côté droit du pédoncule de la fleur précédente.",s:"[BRDV]"},
"Cystogamie":{d:"Formation d'un pont cytogamique (pont de conjugaison) entre 2 filaments : le gamète n'est jamais libéré hors du thalle. Exemple : Spirogyre.",s:"[DV2]"},
"Diakène":{d:"Chez les Apiaceae : fruit sec se divisant en 2 méricarpes.",s:"[MOOC]"},
"Dialypétale":{d:"Corolle à pétales libres.",s:"[TP][BRDV]"},
"Dialysépale":{d:"Calice libre : sépales indépendants les uns des autres.",s:"[TP][BRDV]"},
"Didyname":{d:"Étamines de taille inégale : 2 longues + 2 courtes.",s:"[TP]"},
"Dioïque":{d:"Les 2 sexes sont sur des pieds séparés.",s:"[TP][BRDV]"},
"Drupe":{d:"Seuls l'épicarpe et le mésocarpe sont charnus ; l'endocarpe s'est lignifié pour former le noyau. Le noyau contient une seule graine (monospermé), appelée amande.",s:"[TP][BRDV]"},
"Endoderme":{d:"Couche cellulaire protégeant les tissus conducteurs en partie centrale des aiguilles de conifères.",s:"[GY]"},
"Endoprothallie":{d:"Développement du gamétophyte à l'intérieur du sporange, sans libération de la spore. Présent chez les gymnospermes et certains ptéridophytes.",s:"[GY]"},
"Endosperme":{d:"(1) Chez les gymnospermes : gamétophyte femelle haploïde = partie interne de l'ovule. Tissu nourricier de l'embryon. [GY] (2) Chez les angiospermes : tissu nourricier 3n issu de la double fécondation = albumen.",s:"[GY]"},
"Eudophylles":{d:"Vraies feuilles des Coniférophytes. Exemple : chez le sapin.",s:"[GY]"},
"Extrorse":{d:"Mode de déhiscence des anthères : ouverture vers l'extérieur.",s:"[TP]"},
"Faisceau libéro-ligneux":{d:"Groupement de tissus conducteurs chez les ptéridophytes et les plantes vasculaires : xylème (sève ascendante, rôle de soutien) associé au phloème (sève descendante). Constitue une unité fonctionnelle de conduction.",s:"[PT]"},
"Faux-fruit":{d:"Dérive à 0 % de l'ovaire. La partie charnue provient généralement du réceptacle.",s:"[TP][BRDV]"},
"Feuille flabellée":{d:"Feuille en forme d'éventail. Caractéristique de Ginkgo biloba.",s:"[GY]"},
"Fleur cyclique":{d:"Les pièces florales sont toutes insérées en verticille sur le réceptacle floral.",s:"[TP]"},
"Fleur hémicyclique":{d:"Des pièces florales en verticilles, d'autres en spirales.",s:"[TP]"},
"Follicule":{d:"Fruit constitué d'un seul carpelle, s'ouvrant par une seule fente de déhiscence. Souvent associés en fruits multiples.",s:"[TP][BRDV]"},
"Frondes":{d:"Feuilles des Fougères (Polypodiidae) — mégaphylles à nervures multiples ramifiées. Les jeunes frondes sont enroulées en crosse. [DV] Chez les Cycadées : équivalent des feuilles, portées en couronne apicale sur le tronc.",s:"[DV][GY]"},
"Fruit charnu":{d:"La paroi de l'ovaire se gorge de matières de réserves, notamment de glucides.",s:"[TP]"},
"Fruit multiple":{d:"Une fleur possède plusieurs ovaires → plusieurs fruits se développent.",s:"[TP]"},
"Fruit sec":{d:"La paroi de l'ovaire se dessèche, devient fibreuse.",s:"[TP]"},
"Fruit simple":{d:"Une fleur possède un unique ovaire → un unique fruit se développe.",s:"[TP]"},
"Fruit vrai":{d:"Dérive à 100 % de l'ovaire.",s:"[TP][BRDV]"},
"Frustules":{d:"Paroi des diatomées : structures siliceuses discontinues bivalves emboîtées (deux valves). Au moment de la division, chaque cellule-fille récupère une valve.",s:"[DV2]"},
"Galbule":{d:"Chez Juniperus (Cupressaceae) : cône femelle dont les écailles deviennent charnues et soudées, ressemblant à une baie.",s:"[DV]"},
"Gamopétale":{d:"Corolle à pétales soudés.",s:"[TP][BRDV]"},
"Gamosépale":{d:"Calice soudé : sépales fusionnés ensemble.",s:"[TP][BRDV]"},
"Gamétocyste":{d:"Cellule unisexuée chez les algues : elle ne donnera qu'un seul type de gamètes.",s:"[DV2]"},
"Gemmule":{d:"Partie de l'embryon entre les cotylédons, qui formera la tige et les feuilles.",s:"[TP][BRDV]"},
"Glomérule":{d:"Inflorescence sympodiale contractée — anneaux de fleurs le long d'un axe. Typique des Lamiaceae.",s:"[BRDV][MOOC]"},
"Glumelles":{d:"Chez les Poaceae : deux bractées entourant chaque fleur dans l'épillet.",s:"[MOOC]"},
"Glumes":{d:"Chez les Poaceae : deux bractées à la base de chaque épillet.",s:"[MOOC]"},
"Gousse":{d:"Fruit constitué d'un seul carpelle, s'ouvrant par deux fentes de déhiscence. Chaque ½ carpelle est appelé valve. Caractéristique des Fabacées.",s:"[TP][BRDV]"},
"Graine albuminée":{d:"L'albumen et l'embryon coexistent. L'embryon est petit, noyé dans la masse de l'albumen.",s:"[TP]"},
"Graine amylacée":{d:"Réserves majoritairement glucidiques.",s:"[TP]"},
"Graine exalbuminée":{d:"L'embryon se développe aux dépens de l'albumen — cotylédons volumineux — plus trace d'albumen.",s:"[TP]"},
"Graine oléagineuse":{d:"Réserves majoritairement lipidiques.",s:"[TP]"},
"Graine protéagineuse":{d:"Réserves majoritairement protéiques.",s:"[TP]"},
"Gynostème":{d:"Chez les Orchidaceae : soudure de l'anthère et du style.",s:"[MOOC]"},
"Hadrome":{d:"Association de cellules hydroïdes formant le tissu conducteur d'eau et de minéraux chez les bryophytes évoluées (ex : *Pogonatum*, *Polytrichum*). Analogue fonctionnel du xylème mais sans lignification.",s:"[BR]"},
"Hile":{d:"Cicatrice visible sur la graine (point d'attache au placenta).",s:"[TP]"},
"Hologamie":{d:"Fécondation mettant en présence 2 gamètes morphologiquement et physiologiquement identiques. Cas des unicellulaires.",s:"[DV2]"},
"Hydroïde":{d:"Cellule conductrice de l'eau et des minéraux chez les bryophytes évoluées. Sa paroi se différencie biochimiquement. Rassemblées en hadrome.",s:"[BR]"},
"Hypanthium":{d:"Réceptacle floral élargi en coupe portant les sépales, pétales et étamines. Caractéristique des Rosaceae.",s:"[MOOC]"},
"Hétéromère":{d:"Le nombre de pièces florales diffère d'un verticille à l'autre.",s:"[TP]"},
"Hétéroprothallie":{d:"Mode de développement des spores où une microspore donne un prothalle uniquement mâle et une macrospore donne un prothalle uniquement femelle. Caractère des sélaginelles et de certains équisétophytes.",s:"[PT]"},
"Hétérosporie":{d:"Production de deux types de spores différents (microspores ♂ et mégaspores ♀). Caractère des gymnospermes.",s:"[GY][DV]"},
"Indusie":{d:"Voile membraneux protégeant les sores chez certaines fougères.",s:"[DV]"},
"Innervation dichotomique":{d:"Caractère archaïque des feuilles : les nervures se divisent en deux à plusieurs reprises. Chez Ginkgo biloba.",s:"[GY]"},
"Introrse":{d:"Mode de déhiscence des anthères : ouverture vers l'intérieur de la fleur.",s:"[TP]"},
"Isomère":{d:"Selon la règle d'isomérie, les éléments des verticilles successifs sont en même nombre.",s:"[TP]"},
"Isoporie":{d:"Production de spores toutes identiques entre elles. Caractère des fougères et des lycopodes homosporés (≠ hétérosporie).",s:"[PT]"},
"Isoprothallie":{d:"Mode de développement où une spore donne un prothalle portant à la fois des anthéridies (♂) et des archégones (♀). Caractère des filicophytes et de certains lycophytes et équisétophytes.",s:"[PT]"},
"Labelle":{d:"Chez les Orchidaceae : pétale ventral +/- modifié.",s:"[MOOC]"},
"Latérale":{d:"Mode de déhiscence des anthères : ouverture latérale.",s:"[TP]"},
"Leptome":{d:"Association de cellules leptoïdes formant le tissu conducteur des assimilats (produits de photosynthèse) chez les bryophytes évoluées. Analogue fonctionnel du phloème.",s:"[BR]"},
"Leptoïde":{d:"Petite cellule conductrice des produits de la photosynthèse chez les bryophytes évoluées (ex : *Pogonatum*). Forme une couronne externe autour de l'hadrome. Rassemblées en leptome.",s:"[BR]"},
"Lignine":{d:"Composé biochimique renforçant les parois cellulaires du xylème des végétaux vasculaires. Révolution biochimique permettant la lignification des tissus conducteurs et leur conférant une rigidité structurale. Organisée en barreaux de chaise sur les parois.",s:"[PT]"},
"Ligule":{d:"Chez les Poaceae : structure présente à la base du limbe (jonction gaine/limbe).",s:"[MOOC][ADV]"},
"Macrosporophylle":{d:"Sporophylle femelle chez les plantes hétérosporées. Chez les gymnospermes : feuille modifiée portant les ovules. Synonyme de mégasporophylle.",s:"[AQ][GY]"},
"Microphylles":{d:"Feuilles de petite taille à une seule nervure médiane non ramifiée. Caractère des Lycopodiopsida et Equisetidae.",s:"[DV]"},
"Micropyle":{d:"Orifice visible sur la graine. [TP] Chez les gymnospermes : zone d'entrée du pollen dans l'ovule, reste ouverte.",s:"[TP][GY]"},
"Microsporophylle":{d:"Sporophylle mâle chez les plantes hétérosporées. Chez les plantes à fleurs, les étamines sont interprétées comme microsporophylles.",s:"[AQ][GY]"},
"Monoïque":{d:"Les 2 sexes sont sur le même pied. [TP] Chez les Coniférophytes : majoritairement bisexuées (monoïques).",s:"[TP][BRDV][GY]"},
"Mucilage":{d:"Substance visqueuse faite de polysaccharides maintenant ensemble les cellules des colonies d'algues.",s:"[DV2]"},
"Médifixe":{d:"Insertion du filet dans l'anthère en position médiane.",s:"[TP]"},
"Mégaphylles":{d:"Feuilles à nervation complexe et ramifiée. Présentes chez les Polypodiidae et les Spermatophytes.",s:"[DV]"},
"Mégasporophylle":{d:"Sporophylle femelle chez les plantes hétérosporées. Chez les plantes à fleurs, les carpelles sont interprétés comme mégasporophylles.",s:"[AQ][GY]"},
"Méristème apical / axillaire":{d:"Zone de croissance en longueur à partir des apex ou des bourgeons. Cellules totipotentes.",s:"[GY]"},
"Nectaires extra-floraux":{d:"Glandes nectarifères situées en dehors de la fleur, à la base du limbe. Caractère diagnostique de Prunus laurocerasus (2 glandes à la base du limbe).",s:"[PS]"},
"Nervation palmée":{d:"Type de nervation dans lequel plusieurs nervures principales partent de la base du limbe en rayonnant. Caractère des Ranunculaceae.",s:"[AG]"},
"Nucelle":{d:"Macrosporange de l'ovule — tissu diploïde intermédiaire entre le tégument et l'endosperme.",s:"[GY]"},
"Nématothalle":{d:"Thalle filamenteux avec début de spécialisation. Zone de croissance intercalaire ou apicale. Les cellules-filles se sont divisées sans se séparer.",s:"[DV2]"},
"Ochréa":{d:"Chez les Polygonaceae (Reynoutria) : gaine membraneuse à chaque nœud.",s:"[ADV]"},
"Ombelle":{d:"Tous les pédoncules sont insérés au même niveau sur l'axe.",s:"[BRDV][MOOC]"},
"Oogamie":{d:"Fécondation mettant en présence un gamète petit, mobile (flagellé), produit en grand nombre, et un gamète gros, immobile, chargé en réserves. [DV2] Chez Ginkgo biloba : les spermatozoïdes nagent dans un liquide jusqu'à l'oosphère.",s:"[DV2][GY]"},
"Oosphère":{d:"Gamète femelle situé dans l'archégone de l'endosperme (gamétophyte femelle).",s:"[GY]"},
"Ostiole":{d:"Pore des stomates, entouré de deux cellules de garde.",s:"[GY]"},
"Ovaire infère":{d:"Pièces florales épigynes → conceptacle floral.",s:"[TP][BRDV]"},
"Ovaire supère":{d:"Pièces florales hypogynes → réceptacle floral.",s:"[TP][BRDV]"},
"Panchronique":{d:"Se dit d'un organisme vivant aujourd'hui alors que son phylum originel est fossile. Exemple : Welwitschia (Gnetophyta).",s:"[GY]"},
"Panicule":{d:"Inflorescence ramifiée composée dont les axes secondaires portent eux-mêmes des épillets. Caractéristique de certaines Poaceae.",s:"[AG]"},
"Pappus":{d:"Appendice sur l'akène favorisant la dispersion par le vent. Correspond au développement du calice.",s:"[MOOC]"},
"Phycobilines":{d:"Pigments présents uniquement chez les algues rouges (Rhodobiontes). Permettent l'exploitation de toutes les longueurs d'onde lumineuses.",s:"[DV2]"},
"Piridion":{d:"Le conceptacle devient charnu et comestible. Pseudo-fruit des Maloideae.",s:"[BRDV]"},
"Pistil":{d:"Ensemble des carpelles fusionnés. Pour parler de pistil, il faut que les carpelles soient soudés au moins au niveau de l'ovaire.",s:"[BRDV]"},
"Placentation axile":{d:"3 carpelles (ou plus) fermés et soudés. Le nombre de loges correspond au nombre de carpelles. Ovaire pluriloculaire.",s:"[TP][BRDV]"},
"Placentation centrale":{d:"Carpelles fermés et soudés avec parois intérieures dégradées. Îlot central. Ovaire uniloculaire.",s:"[TP][BRDV]"},
"Placentation pariétale":{d:"Ovules insérés sur la paroi de l'ovaire. Ovaire uniloculaire. Fabaceae (1 carpelle) et Brassicaceae (fausse cloison).",s:"[TP][BRDV]"},
"Plasmodesmes":{d:"Communication entre cellules dont les cytoplasmes sont en contact. Passage sélectif. Apparus avec la lignée verte.",s:"[DV2]"},
"Pollinies":{d:"Pollen aggloméré en massues.",s:"[MOOC]"},
"Poricide":{d:"Mode de déhiscence des anthères : ouverture par pores.",s:"[TP]"},
"Prothalle":{d:"Gamétophyte des ptéridophytes. Structure laminaire de quelques millimètres, autonome (≠ gamétophyte des bryophytes parasite du sporophyte), portant les anthéridies (♂) et les archégones (♀). Issu de la germination d'une spore par mitoses.",s:"[PT]"},
"Protonema":{d:"Structure filamentaire chlorophyllienne issue de la germination d'une spore méiotique de bryophyte. Le protonema primaire est le premier stade de développement. Des bourgeons se forment et donnent naissance aux individus entiers. Le protonema secondaire peut se former par bourgeonnement d'un individu adulte.",s:"[BR]"},
"Pseudo-fruit":{d:"Dérive en partie de l'ovaire et d'autres éléments floraux. Ovaire infère adhérent au conceptacle. Cas particuliers : piridion, péponide.",s:"[TP][BRDV]"},
"Pseudophylles":{d:"Pseudo-feuilles sur une micro-tige reliée à la tige principale. Chez le pin (Pinus).",s:"[GY]"},
"Pseudothalle":{d:"Appareil végétatif des Anthocérophytes ressemblant à un thalle mais constituant bien un cormus. Surface plane épaisse de plusieurs couches de cellules. Chlorophyllien et aplati.",s:"[BR]"},
"Péponide":{d:"Cucurbitacées. Pseudo-baie avec placenta hypertrophié.",s:"[BRDV]"},
"Périanthe":{d:"Ensemble des sépales et des pétales.",s:"[TP]"},
"Péricarpe":{d:"Paroi du fruit, composé de l'épicarpe, du mésocarpe et de l'endocarpe. [TP] Périgone : L'ensemble des tépales",s:"[TP]"},
"Racème":{d:"Un axe avec des fleurs à pédoncules répartis régulièrement. Floraison acropète (basifuge).",s:"[BRDV]"},
"Radicule":{d:"Partie de l'embryon qui donnera les racines.",s:"[TP][BRDV]"},
"Rayons ligneux":{d:"Cellules vivantes nourricières intercalées entre les cellules mortes du xylème.",s:"[GY]"},
"Reviviscence":{d:"Propriété de certaines plantes (notamment les lycophytes et les bryophytes) de tolérer une dessiccation extrême puis de reprendre leur activité physiologique normale à la réhydratation. Caractère adaptatif permettant la survie dans des conditions défavorables.",s:"[PT]"},
"Sac pollinique":{d:"Structure contenant les microspores qui évolueront en grains de pollen.",s:"[GY]"},
"Samare":{d:"Fruit avec une aile développée à partir du carpelle.",s:"[TP][BRDV]"},
"Silique":{d:"Fruit constitué de deux carpelles, s'ouvrant par quatre fentes de déhiscence, avec une fausse cloison (septum) médiane. Caractéristique des Brassicacées. [TP] Silicule [V] Fruit semblable à une silique mais de taille très réduite ( si longueur ≤ 3× largeur ).",s:"[TP][BRDV]"},
"Siphonogamie":{d:"Mode de fécondation chez les Coniférophytes : tube pollinique achemine les gamètes mâles aux gamètes femelles. Fécondation totalement indépendante de l'eau.",s:"[GY]"},
"Sores":{d:"Amas de sporanges sur la face abaxiale des frondes de fougères.",s:"[DV]"},
"Sporocyste":{d:"La cellule du thalle qui donne des cellules productrices de spores.",s:"[DV2]"},
"Sporogone":{d:"Sporophyte des bryophytes. Parasite du gamétophyte sur lequel il se développe après fécondation. Formé d'un pied (ancré dans le gamétophyte), d'une soie et d'une capsule (sporange) apicale protégée par la coiffe.",s:"[BR]"},
"Sporophylle":{d:"Feuille fertile plus ou moins modifiée sur laquelle se forment des sporanges et des spores. Les sporophylles se rencontrent chez les fougères et les plantes à graines.",s:"[AQ]"},
"Sporopollénine":{d:"Substance biochimique très résistante constituant la paroi externe (exine) des spores des ptéridophytes et des grains de pollen des angiospermes. Protège le contenu de la spore contre la dessiccation et les agents extérieurs.",s:"[PT]"},
"Sporotrophophylle":{d:"Feuille qui produit à la fois des spores et une photosynthèse. Elle est pourvue de phylloïdes.",s:"[AQ]"},
"Stigmate":{d:"Sommet des carpelles qui reçoit le pollen.",s:"[BRDV]"},
"Stomate":{d:"Pore épidermique régulé par 2 cellules de garde pouvant s'écarter ou se resserrer pour moduler l'ouverture de l'ostiole. Permet la régulation des échanges gazeux. Apparu chez les ptéridophytes (≠ pores des bryophytes : toujours ouverts, non dynamiques).",s:"[PT]"},
"Strate muscinale":{d:"Plus bas étage de végétation d'un écosystème, constitué de bryophytes. Se trouve à l'interface sol/air.",s:"[BR]"},
"Strobile":{d:"Cône reproducteur terminal constitué de sporophylles portant les sporanges. Présent chez les Equisetales et Lycopodiopsida. [DV] Chez les gymnospermes : structuration des cônes mâles et femelles.",s:"[DV][GY]"},
"Style":{d:"Aide l'avancée du tube pollinique jusqu'à l'ovule ou le fait avorter s'il y a système d'auto-incompatibilité.",s:"[BRDV]"},
"Synange":{d:"Regroupement de 3 sporanges fusionnés formant une structure trilobée. Caractéristique des Psilophytes (ex : *Psilotum*).",s:"[PT]"},
"Synanthérie":{d:"Étamines soudées par leurs anthères.",s:"[TP][MOOC]"},
"Synapses":{d:"Perforations obturées par un bouchon glyco(externe)-protéique(interne). Communication passive — système primitif. Uniquement chez les algues rouges.",s:"[DV2]"},
"Synstémonie":{d:"Étamines soudées par le filet.",s:"[TP]"},
"Thalle":{d:"Ensemble de cellules sans organes distincts.",s:"[BRDV][DV2]"},
"Tigelle":{d:"Partie de l'embryon qui porte les cotylédons.",s:"[TP][BRDV]"},
"Tissu spermogène":{d:"Tissu interne homogène des anthéridies. Après maturation, chaque cellule effectue une mitose dont le produit est un spermatozoïde (anthérozoïde).",s:"[BR]"},
"Trachéophyte":{d:"Végétal vasculaire possédant de vrais tissus conducteurs (xylème et phloème). Inclut les ptéridophytes et les spermaphytes (gymnospermes et angiospermes).",s:"[PT]"},
"Trachéophytes":{d:"Végétaux vasculaires : ptéridophytes et spermaphytes (gymnospermes et angiospermes).",s:"[BRDV]"},
"Trachéïdes aréolées":{d:"Cellules conductrices mortes du xylème des gymnospermes permettant les échanges de sève brute avec les tissus environnants par des zones de contact (aréoles).",s:"[GY]"},
"Triloculaire":{d:"Ovaire à trois loges.",s:"[TP]"},
"Trophophylle":{d:"Feuille stérile (non sporifère), par opposition à la sporophylle.",s:"[AQ]"},
"Tube pollinique":{d:"Structure développée par la cellule du tube du grain de pollen, permettant d'acheminer les spermatozoïdes jusqu'à l'oosphère.",s:"[GY]"},
"Tégument":{d:"(1) Chez les gymnospermes : enveloppe externe de l'ovule dérivant de la macrosporophylle — tissu diploïde. [GY] (2) Chez les angiospermes : enveloppe protectrice de la graine.",s:"[GY][TP]"},
"Tépales":{d:"Pièces du périanthe quand sépales et pétales sont indistinguables.",s:"[TP]"},
"Tétradyname":{d:"6 étamines dont 2 plus petites. Caractéristique des Brassicaceae.",s:"[MOOC][TP]"},
"Uniloculaire":{d:"Ovaire à une seule loge.",s:"[TP]"},
"Zoochorie":{d:"Dispersion des graines par les animaux.",s:"[GY]"},
"Zygomorphe":{d:"Fleur irrégulière : symétrie par rapport à un plan.",s:"[TP][BRDV]"},
"Écaille foliaire":{d:"Feuille modifiée en capuchon abritant les sporanges chez les Équisétophytes. Présente dans la partie apicale des tiges fertiles.",s:"[PT]"},
"Écaille ovulifère":{d:"Exemple de mégasporophylle chez les Coniférophytes. Pièce de nature foliaire supportant les sporanges femelles.",s:"[AQ][GY]"},
"Énation":{d:"Bourrelet ou excroissance écailleuse le long des tiges des Psilophytes (ex : *Psilotum*). Zones de croissance dichotomique.",s:"[PT]"},
"Épi":{d:"Comme le racème, mais sans pédoncules. Floraison basifuge.",s:"[BRDV]"},
"Épicarpe":{d:"Couche externe du péricarpe.",s:"[TP]"},
"Épillet":{d:"Chez les Poaceae : épi de fleurs portant deux glumes à la base ; chaque fleur est entourée par deux glumelles.",s:"[MOOC]"},
"Épipétale":{d:"Position des étamines : insérées devant les pétales.",s:"[TP]"},
"Étamine":{d:"Pièce fertile mâle composée de l'anthère et du filet.",s:"[BRDV]"},
};

// ── Fonctions glossaire ───────────────────────────────────────────────────
function sgl(t){const k=Object.keys(GL).find(k=>k.toLowerCase()===t.toLowerCase());return k?GL[k]:null}
function showGL(t){const e=sgl(t);if(!e)return;document.getElementById('mTerm').textContent=t;document.getElementById('mSrc').textContent=e.s;document.getElementById('mDef').textContent=e.d;document.getElementById('mb').classList.add('open')}
function cgl(){document.getElementById('mb').classList.remove('open')}
function mbc(e){if(e.target===document.getElementById('mb'))cgl()}

// gl() → termes dans les QUESTIONS → clic → modal
function gl(html){
  const terms=Object.keys(GL).sort((a,b)=>b.length-a.length);
  let r=html;
  terms.forEach(t=>{
    const esc=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp(`(?<![a-zA-ZÀ-ÿ0-9_<"'])(${esc})(?![a-zA-ZÀ-ÿ0-9_>])`,'gi');
    r=r.replace(re,`<span class="gl" onclick="showGL('${t}')">$1</span>`);
  });
  return r;
}

// glh() → termes dans les OPTIONS → hover 0.5s → tooltip
function glh(html){
  const terms=Object.keys(GL).sort((a,b)=>b.length-a.length);
  let r=html;
  terms.forEach(t=>{
    const esc=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp(`(?<![a-zA-ZÀ-ÿ0-9_<"'])(${esc})(?![a-zA-ZÀ-ÿ0-9_>])`,'gi');
    r=r.replace(re,`<span class="glt" onmouseenter="startTT(event,'${t}')" onmouseleave="stopTT()">$1</span>`);
  });
  return r;
}

// Tooltip hover 0.5s — disparaît après 3s
let ttTimer=null,ttHideTimer=null;
const TT=document.getElementById('tooltip');
function startTT(e,term){
  stopTT();
  ttTimer=setTimeout(()=>{
    const entry=sgl(term);
    if(!entry)return;
    document.getElementById('ttTerm').textContent=term;
    document.getElementById('ttDef').textContent=entry.d;
    document.getElementById('ttSrc').textContent=entry.s;
    TT.style.display='block';
    positionTT(e);
    ttHideTimer=setTimeout(stopTT,3000);
  },500);
}
function stopTT(){
  clearTimeout(ttTimer);ttTimer=null;
  clearTimeout(ttHideTimer);ttHideTimer=null;
  TT.style.display='none';
}
function positionTT(e){
  const x=e.clientX,y=e.clientY;
  const tw=TT.offsetWidth||300,th=TT.offsetHeight||80;
  const vw=window.innerWidth,vh=window.innerHeight;
  let left=x+12,top=y-10;
  if(left+tw>vw-10)left=x-tw-12;
  if(top+th>vh-10)top=vh-th-10;
  if(top<10)top=10;
  TT.style.left=left+'px';
  TT.style.top=top+'px';
}
document.addEventListener('mousemove',e=>{if(TT.style.display==='block')positionTT(e)});

function buildCarousel(nodeKey){
  const p=PHOTOS[nodeKey];
  if(!p||!p.imgs||!p.imgs.length)return'';
  const idx=photoIdx[nodeKey]||0;
  const src=p.imgs[idx];
  const total=p.imgs.length;
  return`<div class="pcar">
    <div class="pcar-label">${p.label} <span class="pcar-count">${idx+1}/${total}</span></div>
    <div class="pcar-img-wrap">
      <img class="pcar-img" src="${src}" alt="${p.label}" loading="lazy">
    </div>
    <div class="pcar-nav">
      ${idx>0?`<button class="pcar-btn" onclick="navPhoto('${nodeKey}',-1)">&#x2039;</button>`:'<span></span>'}
      <div class="pcar-dots">${p.imgs.map((_,i)=>`<span class="pcar-dot${i===idx?' active':''}" onclick="navPhoto('${nodeKey}',${i-idx})"></span>`).join('')}</div>
      ${idx<total-1?`<button class="pcar-btn" onclick="navPhoto('${nodeKey}',1)">&#x203a;</button>`:'<span></span>'}
    </div>
  </div>`;
}

function navPhoto(key,delta){
  const p=PHOTOS[key];
  if(!p)return;
  const cur=photoIdx[key]||0;
  photoIdx[key]=Math.max(0,Math.min(p.imgs.length-1,cur+delta));
  render();
}

    </div>`;
    return;
  }

  // Question standard — paginated 2 options at a time
  const st=node.src?`<span class="tag-s">${node.src}</span>`:'';
  const _allOps=node.op||[];
  const _inconnu=_allOps.filter(o=>o.t.startsWith('Inconnu'));
  const _regular=_allOps.filter(o=>!o.t.startsWith('Inconnu'));
  const _page=optPage[cur]||0;
  const _start=_page*2;
  const _shown=_regular.slice(_start,_start+2);
  const _total=_regular.length;
  const _hasMore=_start+2<_total;
  const _pageLabel=_total>2?`<div class="opt-page">${_start+1}–${Math.min(_start+2,_total)} / ${_total}</div>`:'';
  const _optsHtml=_shown.map((o,i)=>`<button class="opt" onclick="go('${o.nx}','${o.s}')"><div class="ol">${String.fromCharCode(65+_start+i)}</div><div class="ot">${glh(o.t)}</div></button>`).join('');
  const _autreBtn=_hasMore?`<button class="opt-autre" onclick="nextOptPage('${cur}')"><span>Autre choix</span><span>→</span></button>`:'';
  const _prevBtn=_page>0?`<button class="opt-prev" onclick="prevOptPage('${cur}')">← Précédents</button>`:'';
  const _navHtml=(_prevBtn||_autreBtn)?`<div class="opt-nav">${_prevBtn}<div style="flex:1"></div>${_autreBtn}</div>`:'';
  const _incognuHtml=_inconnu.map(o=>`<button class="opt-inconnu" onclick="go('${o.nx}','${o.s}')"><span>?</span><span>${o.t}</span></button>`).join('');
  app.innerHTML=`<div class="tag-o">Observez : ${node.og}</div>${st}<p class="slbl">${node.st}</p><p class="q">${gl(node.q)}</p>${_pageLabel}<div class="opts">${_optsHtml}</div>${_navHtml}${_incognuHtml}`;
}

function go(nx,sh){hist.push(sh);cur=nx;optPage[nx]=0;render();window.scrollTo({top:0,behavior:'smooth'})}
function nextOptPage(key){optPage[key]=(optPage[key]||0)+1;render();window.scrollTo({top:0,behavior:'smooth'})}
function prevOptPage(key){optPage[key]=Math.max(0,(optPage[key]||0)-1);render();window.scrollTo({top:0,behavior:'smooth'})}
function restart(){hist=[];cur='br';render();window.scrollTo({top:0,behavior:'smooth'})}
render();
</script>
</body>
</html>
